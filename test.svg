<svg fill="none" viewBox="0 0 400 200" width="400" height="200" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
            .container{
                display: flex;
                font-family: sans-serif;
                font-size: 13px;
                flex-direction: column;
                border: 1px dashed #333;
                background-color: transparent;
                box-sizing: border-box;
            }
            .row-wrapper{
                display: flex;
                padding: 5px;
                vertical-align: middle;
            }
            .row-wrapper span{
                display: inline-block;
                font-size: 1rem;
            }
            .col-wrapper{
                display: flex;
                flex-direction: column;
            }
            sub{
                color: #555555;
                padding: 0;
                margin: 0.6rem 0.3rem 0.6rem 0.3rem;
                background-color: #b0b0b040;
                padding: 0.3rem;
                border-radius: 0.1rem;
                display: flex;
                align-items: center;
            }
            p{
                padding: 0;
                margin: 0;
                padding-left: 1.9rem;
            }
            button{
                height: min-content;
                padding: 5px;
                align-self: center;
            }
            hr{
                width: calc(100% - 0.6rem);
            }
            
            </style>
            <div class='container'>
                    <div class="row-wrapper">
                        <h3><span class='emoji'>💟</span> Test block</h3>
                    </div>
                    <div class="col-wrapper">
                        <div class="row-wrapper">
                            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Cupiditate, obcaecati.</p>
                            <button>Button</button>
                        </div>
                    </div>
                    <hr/>
                    <sub>..additional smaller text.</sub>
            </div>
        </div>
    </foreignObject>
</svg>